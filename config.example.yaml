# docport 配置示例
# 复制为 config.yaml 后修改。支持 ${ENV_VAR} 环境变量展开（适合放 token）。

confluence:
  base_url: https://confluence.example.com   # 自建 Confluence 地址（不带末尾 /）
  # 二选一：Personal Access Token（DC 7.9+，推荐）
  token: ${CONFLUENCE_TOKEN}
  # 或 Basic Auth：
  # username: your.name
  # password: ${CONFLUENCE_PASSWORD}
  spaces: [DEV, OPS]      # 要导出的空间 key；留空 [] = 全部 global 空间
  page_size: 50           # 每次 API 分页大小
  sleep_ms: 200           # 分页请求间隔，避免打挂服务器
  timeout_seconds: 30
  insecure_tls: false     # 自签名证书时设为 true

output:
  dir: data               # 产物根目录：data/raw data/docs data/index

index:
  chunk_size: 1800        # 每个 chunk 最大字符数（rune）
  doc_keywords: 12        # 每篇文档提取的关键词数
  chunk_keywords: 8

# 可选：向量化（OpenAI 兼容接口：Ollama / vLLM / OneAPI / OpenAI ...）
# 不启用时检索退化为纯 BM25 关键词检索，依然可用。
embedding:
  enabled: false
  base_url: http://localhost:11434/v1   # Ollama 示例
  api_key: ""
  model: bge-m3                         # 中英混合推荐 bge-m3
  batch: 16

serve:
  addr: 127.0.0.1:8787
  top_k: 8
  # 检索后端（均为进程内，全部文本载入内存，无外部服务依赖）：
  #   bm25  = 内置 BM25（索引带向量且 embedding 可用时叠加向量检索）
  #   bleve = bleve 全文索引（CJK 分析器，不依赖向量化）
  engine: bm25
  # MCP HTTP 传输（exporter mcp -addr ...）的 Bearer Token；
  # 对外网卡监听时必须设置。留空 = 不鉴权。
  mcp_token: ${MCP_TOKEN}
